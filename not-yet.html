<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Yet! | Kushal's Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700;1,400&family=Manrope:wght@300;400;600&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="style.css">
    <style>
        .full-center {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            text-align: center;
            padding: 2rem;
            margin-top: 4rem;
        }
        .cute-icon {
            font-size: 5rem;
            color: var(--pink-primary);
            margin-bottom: 2rem;
            animation: bounce 2s infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        .surprise-text {
            font-family: var(--font-serif);
            font-style: italic;
            font-size: 2rem;
            color: var(--pink-light);
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>


    <main class="bokeh-bg full-center">
        <span class="material-symbols-outlined cute-icon icon-fill">front_hand</span>
        <h1 class="headline" style="font-size: 3.5rem; margin-bottom: 1.5rem;">Oops! Too early... 🙈</h1>
        
        <p class="surprise-text">"Abhi nahi, baad me aana surprise ke liye!" 💖</p>
        
        <p class="subheadline" style="margin-bottom: 3.5rem; max-width: 600px; color: var(--text-muted); font-size: 1.1rem;">
            Patience is key! The surprise will automatically unlock when the countdown reaches zero.✨
        </p>
        
        <a href="index.html" class="reveal-button" style="padding: 1rem 2rem; font-size: 1.1rem;">
            <span class="material-symbols-outlined transition-transform">arrow_back</span>
            Back to Countdown
        </a>
    </main>
</body>
</html>
